services:
  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    command: >
      sh -c "pip install -r requirements.runtime.txt &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app/backend
      - ./stocks.json:/app/stocks.json:ro
      - ./.env:/app/.env:ro
      - backend_pip_cache:/root/.cache/pip
    ports:
      - "8000:8000"

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app/frontend
    command: >
      sh -c "npm ci --cache /tmp/npm-cache --no-audit --no-fund &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - ./stocks.json:/app/stocks.json:ro
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_npm_cache:/tmp/npm-cache
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_pip_cache:
  frontend_npm_cache:
  frontend_node_modules:
